name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: repository-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate required foundation files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            README.md
            SECURITY.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            LICENSE
            .editorconfig
            .gitattributes
            .gitignore
            docs/threat-model.md
            docs/github-admin-checklist.md
            .github/CODEOWNERS
            .github/dependabot.yml
          )
          for path in "${required[@]}"; do
            test -s "$path" || {
              echo "Missing or empty required file: $path"
              exit 1
            }
          done

      - name: Validate public security rule
        shell: bash
        run: |
          set -euo pipefail
          grep -qi "public repository" README.md
          grep -qi "Never commit" SECURITY.md
          grep -qi "secret" SECURITY.md

      - name: Check Markdown links for obvious placeholders
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t markdown_files < <(git ls-files '*.md')
          if [ "${#markdown_files[@]}" -gt 0 ] && grep -InE "TODO|TBD|lorem ipsum" "${markdown_files[@]}"; then
            echo "Placeholder text found in Markdown files."
            exit 1
          fi

      - name: Set up Node when frontend exists
        if: ${{ hashFiles('frontend/package.json') != '' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend checks
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run lint --if-present
          npm run typecheck --if-present
          npm test --if-present
          npm run build --if-present

      - name: Set up Java when backend exists
        if: ${{ hashFiles('backend/pom.xml') != '' }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Backend checks
        if: ${{ hashFiles('backend/pom.xml') != '' }}
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          if [ -x ./mvnw ]; then
            ./mvnw --batch-mode verify
          else
            mvn --batch-mode verify
          fi
