name: Security hardening
description: Track non-sensitive security improvements. Do not disclose vulnerabilities here.
title: "[Security]: "
labels:
  - security
body:
  - type: markdown
    attributes:
      value: |
        Do not report exploitable vulnerabilities or sensitive details in public issues. Use private vulnerability reporting for suspected vulnerabilities.
  - type: textarea
    id: hardening
    attributes:
      label: Hardening objective
      description: What control or security posture improvement is needed?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which code, workflow, infrastructure, or documentation area is affected?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should we prove the hardening is effective?
    validations:
      required: true
